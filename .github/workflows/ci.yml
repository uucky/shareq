name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.release_tag.outputs.is_release }}
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run verification
        run: npm run verify

      - name: Detect release tag
        id: release_tag
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag=''

          if [[ "$GITHUB_EVENT_NAME" == 'push' && "$GITHUB_REF" == "refs/heads/$DEFAULT_BRANCH" ]]; then
              remote="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"

              if [[ "$GITHUB_SERVER_URL" == 'https://github.com' ]]; then
                  remote="https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git"
              fi

              for attempt in {1..5}; do
                  tag="$(
                      git ls-remote --tags "$remote" 'refs/tags/v*' |
                          awk -v sha="$GITHUB_SHA" '
                              $1 == sha && $2 ~ /^refs\/tags\/v/ {
                                  sub(/\^\{\}$/, "", $2)
                                  sub(/^refs\/tags\//, "", $2)
                                  print $2
                                  exit
                              }
                          '
                  )"

                  [[ -n "$tag" ]] && break
                  sleep 2
              done
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if [[ -n "$tag" ]]; then
              echo 'is_release=true' >> "$GITHUB_OUTPUT"
          else
              echo 'is_release=false' >> "$GITHUB_OUTPUT"
          fi

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ needs.test.outputs.tag || 'v0.0.0' }},enable=${{ needs.test.outputs.is_release == 'true' }}
            type=semver,pattern={{version}},value=${{ needs.test.outputs.tag || 'v0.0.0' }},enable=${{ needs.test.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.test.outputs.tag || 'v0.0.0' }},enable=${{ needs.test.outputs.is_release == 'true' && !contains(needs.test.outputs.tag, '-') }}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - docker
      - test
    if: github.event_name == 'push' && needs.test.outputs.is_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Extract changelog notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.test.outputs.tag }}
        run: |
          notes_file="$(mktemp)"

          if awk -v tag="$RELEASE_TAG" '
              index($0, "## [" tag "]") == 1 {
                  in_section = 1
                  found = 1
                  next
              }
              in_section && /^## \[/ {
                  exit
              }
              in_section && /^---$/ {
                  next
              }
              in_section {
                  print
              }
              END {
                  if (!found) {
                      exit 1
                  }
              }
          ' changelog.md > "$notes_file"; then
              if [[ -s "$notes_file" ]]; then
                  echo "found=true" >> "$GITHUB_OUTPUT"
                  echo "path=$notes_file" >> "$GITHUB_OUTPUT"
              else
                  echo "found=false" >> "$GITHUB_OUTPUT"
              fi
          else
              echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release from changelog
        if: steps.notes.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.test.outputs.tag }}
        run: gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "${{ steps.notes.outputs.path }}"

      - name: Create GitHub release with generated notes
        if: steps.notes.outputs.found != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.test.outputs.tag }}
        run: gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
