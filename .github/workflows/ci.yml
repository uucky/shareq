name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run verification
        run: npm run verify

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Extract changelog notes
        id: notes
        shell: bash
        run: |
          notes_file="$(mktemp)"

          if awk -v tag="$GITHUB_REF_NAME" '
              index($0, "## [" tag "]") == 1 {
                  in_section = 1
                  found = 1
                  next
              }
              in_section && /^## \[/ {
                  exit
              }
              in_section && /^---$/ {
                  next
              }
              in_section {
                  print
              }
              END {
                  if (!found) {
                      exit 1
                  }
              }
          ' changelog.md > "$notes_file"; then
              if [[ -s "$notes_file" ]]; then
                  echo "found=true" >> "$GITHUB_OUTPUT"
                  echo "path=$notes_file" >> "$GITHUB_OUTPUT"
              else
                  echo "found=false" >> "$GITHUB_OUTPUT"
              fi
          else
              echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release from changelog
        if: steps.notes.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file "${{ steps.notes.outputs.path }}"

      - name: Create GitHub release with generated notes
        if: steps.notes.outputs.found != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
